<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="venmo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#008CFF"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="cashapp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C244"/>
      <stop offset="100%" stop-color="#00D44A"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="390" height="844" rx="40" ry="40" fill="url(#bg3)"/>

  <!-- Status bar -->
  <text x="30" y="48" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="white">9:41</text>
  <rect x="280" y="34" width="42" height="14" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <rect x="282" y="36" width="30" height="10" rx="5" fill="white" opacity="0.8"/>
  <rect x="325" y="38" width="16" height="10" rx="2" fill="white" opacity="0.6"/>
  <rect x="350" y="36" width="20" height="14" rx="3" fill="white" opacity="0.6"/>

  <!-- Header -->
  <rect x="0" y="60" width="390" height="80" fill="#1e293b"/>
  <text x="195" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">Settle Up</text>

  <!-- Optimal plan badge -->
  <rect x="20" y="160" width="350" height="64" rx="16" fill="#134e4a" stroke="#10b981" stroke-width="1"/>
  <text x="44" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="18">✨</text>
  <text x="68" y="186" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#34d399">Optimal settlement plan</text>
  <text x="68" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6ee7b7">2 payments clear all debts (min possible)</text>

  <!-- Payment 1 -->
  <text x="20" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="0.5">PAYMENT 1 OF 2</text>
  <rect x="20" y="272" width="350" height="160" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- From avatar -->
  <circle cx="80" cy="330" r="32" fill="#7c3aed"/>
  <text x="80" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">J</text>
  <text x="80" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Jordan</text>

  <!-- Arrow -->
  <text x="195" y="332" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#6366f1" text-anchor="middle">→</text>
  <text x="195" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="800">$62.00</text>

  <!-- To avatar -->
  <circle cx="310" cy="330" r="32" fill="#0f766e"/>
  <text x="310" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">Y</text>
  <text x="310" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">You</text>

  <!-- Payment method buttons -->
  <rect x="36" y="378" width="150" height="40" rx="12" fill="url(#venmo)"/>
  <text x="111" y="403" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Venmo</text>

  <rect x="204" y="378" width="150" height="40" rx="12" fill="url(#cashapp)"/>
  <text x="279" y="403" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Cash App</text>

  <!-- Payment 2 -->
  <text x="20" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="0.5">PAYMENT 2 OF 2</text>
  <rect x="20" y="472" width="350" height="160" rx="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <circle cx="80" cy="530" r="32" fill="#0891b2"/>
  <text x="80" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">S</text>
  <text x="80" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Sam</text>

  <text x="195" y="532" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#6366f1" text-anchor="middle">→</text>
  <text x="195" y="552" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="800">$38.75</text>

  <circle cx="310" cy="530" r="32" fill="#ea580c"/>
  <text x="310" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">A</text>
  <text x="310" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Alex</text>

  <rect x="36" y="578" width="150" height="40" rx="12" fill="url(#venmo)"/>
  <text x="111" y="603" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">Venmo</text>

  <rect x="204" y="578" width="150" height="40" rx="12" fill="#334155"/>
  <text x="279" y="603" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#64748b" text-anchor="middle" font-weight="600">No Cash App</text>

  <!-- Mark all settled button -->
  <rect x="20" y="660" width="350" height="56" rx="28" fill="url(#emerald)"/>
  <text x="195" y="693" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="700">Mark All Settled</text>

  <!-- History link -->
  <text x="195" y="738" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#64748b" text-anchor="middle">View settlement history ›</text>

  <!-- Bottom Nav -->
  <rect x="0" y="764" width="390" height="80" fill="#0f172a"/>
  <rect x="0" y="764" width="390" height="1" fill="#334155"/>

  <g opacity="0.5">
    <text x="49" y="793" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">🏠</text>
    <text x="49" y="812" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Home</text>
  </g>
  <g opacity="0.5">
    <text x="146" y="793" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">🧾</text>
    <text x="146" y="812" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Expenses</text>
  </g>
  <g>
    <text x="244" y="793" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">🤝</text>
    <text x="244" y="812" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="700">Settle</text>
    <rect x="229" y="820" width="30" height="3" rx="2" fill="#6366f1"/>
  </g>
  <g opacity="0.5">
    <text x="341" y="793" font-family="system-ui,-apple-system,sans-serif" font-size="22" text-anchor="middle">📊</text>
    <text x="341" y="812" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Stats</text>
  </g>

  <rect x="145" y="828" width="100" height="4" rx="2" fill="white" opacity="0.3"/>
</svg>
